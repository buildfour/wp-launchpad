name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.x'
        channel: 'stable'

    - name: Install dependencies
      working-directory: wp-launchpad-main/wp_launchpad/wp_launchpad_flutter
      run: flutter pub get

    - name: Build APK
      working-directory: wp-launchpad-main/wp_launchpad/wp_launchpad_flutter
      run: flutter build apk --release

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: wp-launchpad-apk
        path: wp-launchpad-main/wp_launchpad/wp_launchpad_flutter/build/app/outputs/flutter-apk/app-release.apk

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: wp-launchpad-main/wp_launchpad/wp_launchpad_flutter/build/app/outputs/flutter-apk/app-release.apk
        body: |
          ## WP Launchpad APK
          Download the APK to install on Android devices.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
